# /etc/nginx/sites-available/locumlink-staging
# ln -s this file to sites-enabled, then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name staging.locumlink.ca;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staging.locumlink.ca;

    ssl_certificate     /etc/letsencrypt/live/staging.locumlink.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.locumlink.ca/privkey.pem;

    client_max_body_size 10m;

    # OAuth callbacks (Supabase session cookies) can exceed default nginx header buffers.
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    large_client_header_buffers 4 32k;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
